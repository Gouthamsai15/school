<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDDIA ERP - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-md p-10 rounded-3xl shadow-xl border border-slate-100">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500">Sign in to your INDDIA ERP account</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="Enter your username">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Role</label>
                <select id="role" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                    <option value="" disabled selected>Select your role</option>
                    <option value="Admin">Admin</option>
                    <option value="Teaching Staff">Teaching Staff</option>
                    <option value="Non-Teaching Staff">Non-Teaching Staff</option>
                    <option value="Student">Student</option>
                    <option value="Parent">Parent</option>
                    <option value="Guest">Guest</option>
                    <option value="HR">HR</option>
                    <option value="Accounts">Accounts</option>
                    <option value="Transport">Transport</option>
                    <option value="Admission">Admission</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-all shadow-lg hover:shadow-indigo-200 active:scale-[0.98]">
                Sign In
            </button>
            <div id="loginStatus" class="text-center text-xs text-slate-400 mt-2">Script initializing...</div>
            <div id="manualRedirect" class="hidden text-center mt-4">
                <p class="text-xs text-slate-500 mb-2">Taking too long?</p>
                <a href="/dashboard.html" class="text-indigo-600 font-bold hover:underline">Click here to go to Dashboard</a>
            </div>
        </form>

        <div class="mt-8 text-center">
            <a href="/home.html" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors">← Back to Homepage</a>
        </div>
    </div>

    <script type="module" src="/src/login.ts"></script>
</body>
</html>
